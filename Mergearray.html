<!DOCTYPE html>
<html>
    <head>
        <title>Merge Array</title>
        <script>

            let data1=[10,20,30,67];
            let data2=[1,2,3,4,5,6];
            let merge_array=[];
            console.log(data1,data2);
            for(let i=0;i<data1.length;i++){
                merge_array[i]=data1[i];
               
            }
            for(let i=0; i<data2.length;i++){
               merge_array[data1.length+i]=data2[i];
            }
            console.log(merge_array);
        </script>
        </head>
        <body>
         <input type="text" id="element"/>
         <button onCLick="getElement()">Get </button>
        </body>

        </html>
