    <body>
        <script>
        let data=[];
        let currentSize=data.length;

        function push(newVal){
            data[currentSize]=newVal;
            currentSize=currentSize+1;

        }
        function pop(){
          if(currentSize==0){
            return "Stack is empty";
          }
          else{
            lastval=data[currentSize-1];
            currentSize=currentSize-1;
            
            data.length=currentSize;
            
          }
          return lastval;
        }

    
        
        function reverseStack(item){
         for (let i=0;i<item.length;i++){
            push(item[i]);
        }
        for(let i=0;i<item.length;i++){
         item[i]=pop();
        }
        

    }
        let str="Nagesh";
        str=str.split("");
        console.log(str);
        reverseStack(str)
        console.warn(str.join(""));
 
        
        
 
        </script>
       <h1>Reverse string with stack</h1>
    </body>
